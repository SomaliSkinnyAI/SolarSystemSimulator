<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System Simulator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
      }
      #canvas-container {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
      }
      #canvas-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      #ui-root {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 100;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
      }
      #hud {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 100;
        color: rgba(255,255,255,0.6);
        font-size: 11px;
        line-height: 1.8;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(0,0,0,0.8);
      }
      #crosshair {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 20px; height: 20px;
        pointer-events: none;
        display: none;
        z-index: 200;
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 200, 50, 0.8);
      }
      #crosshair::before {
        width: 2px; height: 100%;
        left: 50%; transform: translateX(-50%);
      }
      #crosshair::after {
        height: 2px; width: 100%;
        top: 50%; transform: translateY(-50%);
      }
      #god-mode-hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 200, 50, 0.9);
        font-size: 12px;
        font-family: 'Courier New', monospace;
        text-shadow: 0 0 10px rgba(255, 200, 50, 0.5);
        pointer-events: none;
        display: none;
        z-index: 200;
        background: rgba(0,0,0,0.6);
        padding: 6px 14px;
        border-radius: 4px;
        border: 1px solid rgba(255, 200, 50, 0.3);
      }

      /* --- Spawn panel (God Mode) --- */
      #spawn-panel {
        position: fixed;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 260px;
        background: rgba(10, 12, 20, 0.92);
        border: 1px solid rgba(255, 200, 50, 0.25);
        border-radius: 10px;
        padding: 14px;
        color: #ccc;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        z-index: 300;
        display: none;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
      }
      #spawn-panel.open { display: block; }
      .spawn-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .spawn-title {
        color: rgba(255, 200, 50, 0.9);
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      .spawn-close {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.4);
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
      }
      .spawn-close:hover { color: #fff; }
      .spawn-presets {
        display: flex;
        gap: 3px;
        margin-bottom: 10px;
      }
      .spawn-preset-btn {
        flex: 1;
        padding: 5px 2px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        color: #999;
        font-family: 'Courier New', monospace;
        font-size: 9px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
      }
      .spawn-preset-btn:hover {
        background: rgba(255, 200, 50, 0.12);
        border-color: rgba(255, 200, 50, 0.35);
        color: #ddd;
      }
      .spawn-preset-btn.active {
        background: rgba(255, 200, 50, 0.18);
        border-color: rgba(255, 200, 50, 0.6);
        color: #ffc832;
      }
      .spawn-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }
      .spawn-row label {
        width: 70px;
        flex-shrink: 0;
        color: rgba(255, 255, 255, 0.45);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .spawn-row input[type="range"] {
        flex: 1;
        height: 4px;
        accent-color: rgba(255, 200, 50, 0.8);
      }
      .spawn-val {
        width: 60px;
        text-align: right;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.65);
      }
      .spawn-row select,
      .spawn-text-input,
      .spawn-num-input {
        flex: 1;
        padding: 3px 6px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        color: #ddd;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        outline: none;
      }
      .spawn-row select:focus,
      .spawn-text-input:focus,
      .spawn-num-input:focus {
        border-color: rgba(255, 200, 50, 0.4);
      }
      .spawn-row input[type="color"] {
        width: 32px;
        height: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        background: none;
        cursor: pointer;
        padding: 0;
      }
      .spawn-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        margin: 8px 0;
      }
      .spawn-info {
        padding: 6px 0;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.55);
        font-size: 10px;
        min-height: 20px;
      }
      .spawn-info .info-label {
        color: rgba(255, 200, 50, 0.6);
      }
      .spawn-info .info-hint {
        color: rgba(255, 200, 50, 0.5);
        font-style: italic;
      }
      .spawn-go-btn {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        background: rgba(255, 200, 50, 0.15);
        border: 1px solid rgba(255, 200, 50, 0.4);
        border-radius: 6px;
        color: rgba(255, 200, 50, 0.9);
        font-family: 'Courier New', monospace;
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .spawn-go-btn:hover {
        background: rgba(255, 200, 50, 0.25);
        border-color: rgba(255, 200, 50, 0.7);
      }

      /* --- Date overlay --- */
      #date-overlay {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 150;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 6px 18px;
        background: rgba(10, 12, 25, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        backdrop-filter: blur(8px);
        font-family: 'Courier New', monospace;
        color: rgba(255, 255, 255, 0.85);
        cursor: pointer;
        user-select: none;
        transition: border-color 0.2s;
      }
      #date-overlay:hover {
        border-color: rgba(255, 255, 255, 0.35);
      }
      #date-display {
        font-size: 15px;
        font-weight: bold;
        letter-spacing: 1.5px;
      }
      #time-display {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.5px;
      }

      /* --- Date picker modal --- */
      #date-picker-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 300;
        padding: 20px 24px;
        background: rgba(15, 18, 35, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        backdrop-filter: blur(16px);
        font-family: 'Courier New', monospace;
        color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
      }
      #date-picker-modal.open { display: flex; flex-direction: column; gap: 12px; align-items: center; }
      #date-picker-modal .picker-title {
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.7);
      }
      #date-picker-modal input {
        padding: 6px 10px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: white;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        outline: none;
        width: 200px;
        text-align: center;
      }
      #date-picker-modal input:focus { border-color: rgba(100, 180, 255, 0.5); }
      #date-picker-modal .picker-buttons { display: flex; gap: 10px; }
      #date-picker-modal button {
        padding: 6px 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
      }
      #date-picker-modal button:hover { background: rgba(255, 255, 255, 0.18); }
      #date-go-btn { background: rgba(60, 130, 200, 0.3); border-color: rgba(60, 130, 200, 0.5); }
      #date-go-btn:hover { background: rgba(60, 130, 200, 0.5); }
      #date-picker-modal .picker-hint {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
      }
      /* Modal backdrop */
      #date-picker-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 250;
        background: rgba(0, 0, 0, 0.5);
      }
      #date-picker-backdrop.open { display: block; }

      /* --- CSS2DRenderer overlay --- */
      #label-container {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        pointer-events: none;
        overflow: hidden;
        z-index: 50;
      }
      #label-container > div {
        /* CSS2DRenderer creates a wrapper div; ensure it fills the container */
        pointer-events: none;
      }

      /* Planet labels */
      .planet-label {
        pointer-events: auto;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 2px 8px 2px 5px;
        background: rgba(0, 0, 0, 0.45);
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        white-space: nowrap;
        user-select: none;
        transition: background 0.2s, border-color 0.2s;
      }
      .planet-label:hover {
        background: rgba(40, 40, 60, 0.7);
        border-color: rgba(255, 255, 255, 0.35);
      }
      .planet-label .pip {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        box-shadow: 0 0 4px currentColor;
      }
      .planet-label .name {
        color: rgba(255, 255, 255, 0.8);
        font-family: 'Courier New', monospace;
        font-size: 11px;
        letter-spacing: 0.5px;
        text-shadow: 0 0 6px rgba(0,0,0,0.9);
      }
      /* Moon labels — smaller and more subtle */
      .moon-label {
        padding: 1px 6px 1px 4px;
        background: rgba(0, 0, 0, 0.35);
        border-color: rgba(255, 255, 255, 0.06);
      }
      .moon-label .pip {
        width: 6px; height: 6px;
      }
      .moon-label .name {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.6);
      }

      /* --- Planet data card --- */
      #planet-card {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 150;
        min-width: 260px;
        background: rgba(10, 12, 25, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 0;
        font-family: 'Courier New', monospace;
        color: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.3s ease, transform 0.3s ease;
        pointer-events: none;
      }
      #planet-card.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      #planet-card .card-accent {
        height: 3px;
        border-radius: 12px 12px 0 0;
      }
      #planet-card .card-header {
        padding: 12px 16px 6px;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #planet-card .card-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 12px;
        padding: 6px 16px 14px;
        font-size: 11px;
      }
      #planet-card .card-grid .label {
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #planet-card .card-grid .value {
        color: rgba(255, 255, 255, 0.9);
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="label-container"></div>
    <div id="ui-root"></div>
    <div id="hud"></div>
    <div id="crosshair"></div>

    <!-- Date overlay — always visible, click to open date picker -->
    <div id="date-overlay">
      <span id="date-display">2000-01-01</span>
      <span id="time-display">12:00:00 UTC</span>
    </div>

    <!-- Date picker modal -->
    <div id="date-picker-backdrop"></div>
    <div id="date-picker-modal">
      <div class="picker-title">Jump to Date</div>
      <input type="date" id="date-input" />
      <input type="time" id="time-input" value="12:00" step="1" />
      <div class="picker-buttons">
        <button id="date-go-btn">Go</button>
        <button id="date-cancel-btn">Cancel</button>
      </div>
      <div class="picker-hint">JPL elements valid 1800 - 3000 AD</div>
    </div>
    <!-- Spawn panel (God Mode) -->
    <div id="spawn-panel">
      <div class="spawn-header">
        <span class="spawn-title">Spawn Body</span>
        <button id="spawn-cancel-btn" class="spawn-close">&times;</button>
      </div>
      <div class="spawn-presets">
        <button class="spawn-preset-btn" data-preset="asteroid">Asteroid</button>
        <button class="spawn-preset-btn" data-preset="moon">Moon</button>
        <button class="spawn-preset-btn active" data-preset="rocky">Planet</button>
        <button class="spawn-preset-btn" data-preset="gas">Gas Giant</button>
        <button class="spawn-preset-btn" data-preset="star">Star</button>
      </div>
      <div class="spawn-row">
        <label>Name</label>
        <input type="text" id="spawn-name" value="Planet" class="spawn-text-input">
      </div>
      <div class="spawn-row">
        <label>Mass</label>
        <input type="range" id="spawn-mass" min="12" max="32" step="0.1" value="24.8">
        <span id="spawn-mass-val" class="spawn-val">6.0e24</span>
      </div>
      <div class="spawn-row">
        <label>Radius</label>
        <input type="range" id="spawn-radius" min="3" max="10" step="0.1" value="6.8">
        <span id="spawn-radius-val" class="spawn-val">6.4e6</span>
      </div>
      <div class="spawn-row">
        <label>Color</label>
        <input type="color" id="spawn-color" value="#CC8844">
      </div>
      <div class="spawn-divider"></div>
      <div class="spawn-row">
        <label>Orbit</label>
        <select id="spawn-orbit-target">
          <option value="none">None (free)</option>
          <option value="sun" selected>Sun</option>
        </select>
      </div>
      <div class="spawn-row" id="spawn-orbit-type-field">
        <label>Type</label>
        <select id="spawn-orbit-type">
          <option value="circular">Circular</option>
          <option value="elliptical">Elliptical</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="spawn-row" id="spawn-direction-field">
        <label>Direction</label>
        <select id="spawn-direction">
          <option value="prograde">Prograde</option>
          <option value="retrograde">Retrograde</option>
        </select>
      </div>
      <div class="spawn-row" id="spawn-ecc-field" style="display:none">
        <label>Eccentricity</label>
        <input type="range" id="spawn-eccentricity" min="0" max="0.95" step="0.01" value="0">
        <span id="spawn-ecc-val" class="spawn-val">0.00</span>
      </div>
      <div id="spawn-custom-vel" style="display:none">
        <div class="spawn-row">
          <label>Vx (km/s)</label>
          <input type="number" id="spawn-vx" value="0" step="0.1" class="spawn-num-input">
        </div>
        <div class="spawn-row">
          <label>Vy (km/s)</label>
          <input type="number" id="spawn-vy" value="0" step="0.1" class="spawn-num-input">
        </div>
        <div class="spawn-row">
          <label>Vz (km/s)</label>
          <input type="number" id="spawn-vz" value="0" step="0.1" class="spawn-num-input">
        </div>
      </div>
      <div id="spawn-orbit-info" class="spawn-info">
        <span class="info-hint">Click in the scene to place body</span>
      </div>
      <button id="spawn-go-btn" class="spawn-go-btn">Spawn</button>
    </div>

    <div id="god-mode-hint">GOD MODE — Click in the scene to place a body</div>
    <div id="planet-card">
      <div class="card-accent"></div>
      <div class="card-header"></div>
      <div class="card-grid"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
