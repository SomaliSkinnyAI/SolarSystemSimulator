<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System Simulator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
      }
      #canvas-container {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
      }
      #canvas-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      #ui-root {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 100;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
      }
      #hud {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 100;
        color: rgba(255,255,255,0.6);
        font-size: 11px;
        line-height: 1.8;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(0,0,0,0.8);
      }
      #crosshair {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 20px; height: 20px;
        pointer-events: none;
        display: none;
        z-index: 200;
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 200, 50, 0.8);
      }
      #crosshair::before {
        width: 2px; height: 100%;
        left: 50%; transform: translateX(-50%);
      }
      #crosshair::after {
        height: 2px; width: 100%;
        top: 50%; transform: translateY(-50%);
      }
      #god-mode-hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 200, 50, 0.9);
        font-size: 12px;
        font-family: 'Courier New', monospace;
        text-shadow: 0 0 10px rgba(255, 200, 50, 0.5);
        pointer-events: none;
        display: none;
        z-index: 200;
        background: rgba(0,0,0,0.6);
        padding: 6px 14px;
        border-radius: 4px;
        border: 1px solid rgba(255, 200, 50, 0.3);
      }

      /* --- Date overlay --- */
      #date-overlay {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 150;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 6px 18px;
        background: rgba(10, 12, 25, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        backdrop-filter: blur(8px);
        font-family: 'Courier New', monospace;
        color: rgba(255, 255, 255, 0.85);
        cursor: pointer;
        user-select: none;
        transition: border-color 0.2s;
      }
      #date-overlay:hover {
        border-color: rgba(255, 255, 255, 0.35);
      }
      #date-display {
        font-size: 15px;
        font-weight: bold;
        letter-spacing: 1.5px;
      }
      #time-display {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.5px;
      }

      /* --- Date picker modal --- */
      #date-picker-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 300;
        padding: 20px 24px;
        background: rgba(15, 18, 35, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        backdrop-filter: blur(16px);
        font-family: 'Courier New', monospace;
        color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
      }
      #date-picker-modal.open { display: flex; flex-direction: column; gap: 12px; align-items: center; }
      #date-picker-modal .picker-title {
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.7);
      }
      #date-picker-modal input {
        padding: 6px 10px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: white;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        outline: none;
        width: 200px;
        text-align: center;
      }
      #date-picker-modal input:focus { border-color: rgba(100, 180, 255, 0.5); }
      #date-picker-modal .picker-buttons { display: flex; gap: 10px; }
      #date-picker-modal button {
        padding: 6px 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
      }
      #date-picker-modal button:hover { background: rgba(255, 255, 255, 0.18); }
      #date-go-btn { background: rgba(60, 130, 200, 0.3); border-color: rgba(60, 130, 200, 0.5); }
      #date-go-btn:hover { background: rgba(60, 130, 200, 0.5); }
      #date-picker-modal .picker-hint {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
      }
      /* Modal backdrop */
      #date-picker-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 250;
        background: rgba(0, 0, 0, 0.5);
      }
      #date-picker-backdrop.open { display: block; }

      /* --- CSS2DRenderer overlay --- */
      #label-container {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        pointer-events: none;
        overflow: hidden;
        z-index: 50;
      }
      #label-container > div {
        /* CSS2DRenderer creates a wrapper div; ensure it fills the container */
        pointer-events: none;
      }

      /* Planet labels */
      .planet-label {
        pointer-events: auto;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 2px 8px 2px 5px;
        background: rgba(0, 0, 0, 0.45);
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        white-space: nowrap;
        user-select: none;
        transition: background 0.2s, border-color 0.2s;
      }
      .planet-label:hover {
        background: rgba(40, 40, 60, 0.7);
        border-color: rgba(255, 255, 255, 0.35);
      }
      .planet-label .pip {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        box-shadow: 0 0 4px currentColor;
      }
      .planet-label .name {
        color: rgba(255, 255, 255, 0.8);
        font-family: 'Courier New', monospace;
        font-size: 11px;
        letter-spacing: 0.5px;
        text-shadow: 0 0 6px rgba(0,0,0,0.9);
      }
      /* Moon labels — smaller and more subtle */
      .moon-label {
        padding: 1px 6px 1px 4px;
        background: rgba(0, 0, 0, 0.35);
        border-color: rgba(255, 255, 255, 0.06);
      }
      .moon-label .pip {
        width: 6px; height: 6px;
      }
      .moon-label .name {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.6);
      }

      /* --- Planet data card --- */
      #planet-card {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 150;
        min-width: 260px;
        background: rgba(10, 12, 25, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 0;
        font-family: 'Courier New', monospace;
        color: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.3s ease, transform 0.3s ease;
        pointer-events: none;
      }
      #planet-card.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      #planet-card .card-accent {
        height: 3px;
        border-radius: 12px 12px 0 0;
      }
      #planet-card .card-header {
        padding: 12px 16px 6px;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #planet-card .card-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 12px;
        padding: 6px 16px 14px;
        font-size: 11px;
      }
      #planet-card .card-grid .label {
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #planet-card .card-grid .value {
        color: rgba(255, 255, 255, 0.9);
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="label-container"></div>
    <div id="ui-root"></div>
    <div id="hud"></div>
    <div id="crosshair"></div>

    <!-- Date overlay — always visible, click to open date picker -->
    <div id="date-overlay">
      <span id="date-display">2000-01-01</span>
      <span id="time-display">12:00:00 UTC</span>
    </div>

    <!-- Date picker modal -->
    <div id="date-picker-backdrop"></div>
    <div id="date-picker-modal">
      <div class="picker-title">Jump to Date</div>
      <input type="date" id="date-input" />
      <input type="time" id="time-input" value="12:00" step="1" />
      <div class="picker-buttons">
        <button id="date-go-btn">Go</button>
        <button id="date-cancel-btn">Cancel</button>
      </div>
      <div class="picker-hint">JPL elements valid 1800 - 3000 AD</div>
    </div>
    <div id="god-mode-hint">GOD MODE — Click to spawn body &bull; Drag to set velocity</div>
    <div id="planet-card">
      <div class="card-accent"></div>
      <div class="card-header"></div>
      <div class="card-grid"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
